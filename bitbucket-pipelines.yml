image: node:20 # Use the latest LTS

pipelines:
  branches:
    staging:
      - step:
          name: "Deploy Staging Frontend"
          condition:
            changesets:
              includePaths:
                - "apps/frontend/**"
                - "packages/**"
          script:
            - corepack enable               # <--- This is the key line
            - corepack prepare pnpm@latest --activate
            - pnpm install
            - pnpm turbo deploy --filter=frontend --no-cache --name=authentication-staging # Deploys to Cloudflare
          services:
            - docker

      - step:
          name: "Deploy Staging Backend"
          condition:
            changesets:
              includePaths:
                - "apps/backend/**"
                - "packages/**"
          script:
            - corepack enable
            - corepack prepare pnpm@latest --activate
            - pnpm install
            - pnpm turbo build --filter=backend
            # Render usually uses a Deploy Hook (Webhook) for free tiers
            - curl -X POST $RENDER_DEPLOY_STAGING_HOOK_URL

    main:
      - step:
          name: "Deploy Production Frontend"
          condition:
            changesets:
              includePaths:
                - "apps/frontend/**"
                - "packages/**"
          script:
            - corepack enable               # <--- This is the key line
            - corepack prepare pnpm@latest --activate
            - pnpm install
            - pnpm turbo deploy --filter=frontend --no-cache --name=authentication # Deploys to Cloudflare
          services:
            - docker

      - step:
          name: "Deploy Production Backend"
          condition:
            changesets:
              includePaths:
                - "apps/backend/**"
                - "packages/**"
          script:
            - corepack enable
            - corepack prepare pnpm@latest --activate
            - pnpm install
            - pnpm turbo build --filter=backend
            # Render usually uses a Deploy Hook (Webhook) for free tiers
            - curl -X POST $RENDER_DEPLOY_PROD_HOOK_URL