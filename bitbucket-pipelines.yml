image: node:20 # Use the latest LTS

pipelines:
  branches:
    main:
      - step:
          name: "Build and Deploy Frontend (Cloudflare)"
          # condition:
          #   changesets:
          #     includePaths:
          #       - "apps/frontend/**"
          #       - "packages/**"
          script:
            - corepack enable               # <--- This is the key line
            - corepack prepare pnpm@latest --activate
            - pnpm install
            - pnpm turbo deploy --filter=frontend # Deploys to Cloudflare
          services:
            - docker

      - step:
          name: "Deploy Backend (Render)"
          # condition:
          #   changesets:
          #     includePaths:
          #       - "apps/backend/**"
          #       - "packages/**"
          script:
            - corepack enable
            - corepack prepare pnpm@latest --activate
            - pnpm install
            - pnpm turbo build --filter=backend
            # Render usually uses a Deploy Hook (Webhook) for free tiers
            - curl -X POST $RENDER_DEPLOY_HOOK_URL